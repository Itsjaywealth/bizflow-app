<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BizFlow NG Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      }

      main {
        width: min(28rem, calc(100vw - 2rem));
        background: white;
        border-radius: 28px;
        padding: 2rem;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
        border: 1px solid rgba(148, 163, 184, 0.2);
        text-align: center;
      }

      h1 {
        margin-bottom: 0.75rem;
        font-size: 1.75rem;
      }

      p {
        line-height: 1.7;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You’re offline</h1>
      <p>BizFlow NG saved the app shell for you, but this page needs a connection to load fresh business data. Reconnect and try again.</p>
    </main>
  </body>
  </html>
